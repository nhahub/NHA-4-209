<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – SkyScope</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <i class="fas fa-plane-departure"></i>
      </div>
      <h1>SkyScope</h1>
      <p class="subtitle">Flight Delay Analytics &amp; Management System</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2 small" role="alert">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold small">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="fas fa-user text-muted"></i></span>
            <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label for="password" class="form-label fw-semibold small">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="fas fa-lock text-muted"></i></span>
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-login">
          <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
      </form>

      <div class="demo-credentials">
        <strong>Demo Accounts:</strong><br>
        Admin: <code>admin</code> / <code>admin123</code><br>
        User: <code>user</code> / <code>user123</code>
      </div>
    </div>
  </div>
</body>
</html>
